<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Project</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; 
            color: #e2e8f0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            text-align: center; 
            background: #1e293b; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px rgba(0,0,0,0.5); 
            border-top: 5px solid #38bdf8; 
        }
        h1 { color: #38bdf8; margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 20px; }
        .icon { font-size: 50px; margin-bottom: 10px; }
        .tag { 
            background: #334155; 
            padding: 8px 15px; 
            border-radius: 20px; 
            font-size: 0.9em; 
            margin: 5px; 
            display: inline-block; 
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚀☁️⚙️</div>
        <h1>DevOps Deployment</h1>
        <p>Static site deployment using Git, GitHub, and AWS S3.</p>
        <div>
            <span class="tag">Git</span>
            <span class="tag">AWS S3</span>
            <span class="tag">AWS CLI</span>
        </div>
    </div>
</body>
</html>
